<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-label="Career themed background">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="720" fill="url(#bg)"/>
  <!-- Abstract shapes suggesting guidance, learning, and careers -->
  <g opacity="0.25">
    <circle cx="200" cy="180" r="120" fill="url(#accent)"/>
    <circle cx="1260" cy="140" r="90" fill="#a7f3d0"/>
    <circle cx="1180" cy="560" r="140" fill="#fde68a"/>
    <circle cx="280" cy="560" r="110" fill="#fbcfe8"/>
  </g>
  <g opacity="0.15">
    <path d="M0,520 C240,420 480,680 720,560 C960,440 1200,520 1440,460 L1440,720 L0,720 Z" fill="#93c5fd"/>
  </g>
  <!-- Subtle icons (cap, briefcase, compass) as outlines -->
  <g opacity="0.25" stroke="#0056d6" stroke-width="4" fill="none">
    <path d="M420 260 l100 -40 l100 40 l-100 40 z M460 280 v60 M540 280 v60"/>
    <rect x="980" y="260" width="120" height="80" rx="10"/>
    <path d="M1040 260 v-24 m-40 140 h80"/>
    <circle cx="760" cy="360" r="56"/>
    <path d="M760 304 l8 24 l24 8 l-24 8 l-8 24 l-8 -24 l-24 -8 l24 -8 z"/>
  </g>
</svg>


